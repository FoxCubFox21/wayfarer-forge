<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rocket Test — AstroMystery</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #000; color: #fff; font-family: 'SF Mono', monospace; }
  #canvas { display: block; width: 100%; height: 100%; }
  .hud {
    position: fixed; top: 16px; left: 16px; z-index: 10;
    font-size: 11px; letter-spacing: 2px; color: rgba(255,255,255,0.5);
  }
  .hud .title { color: #00d4ff; font-weight: 700; }
  .hud .hint { margin-top: 4px; color: rgba(255,255,255,0.3); }
  .loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #000; color: #00d4ff; font-size: 12px; letter-spacing: 3px;
    transition: opacity 0.5s;
  }
  .loading.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>
<div class="loading" id="loading">LOADING...</div>
<canvas id="canvas"></canvas>
<div class="hud">
  <div class="title" id="hudTitle">ROCKET_001</div>
  <div class="hint">drag to rotate · scroll to zoom</div>
  <div style="margin-top:12px;display:flex;gap:6px;flex-wrap:wrap;">
    <button class="btn" data-model="rocket.glb" data-name="ROCKET_001">rocket</button>
    <button class="btn" data-model="palm.glb" data-name="PALM_TREE">palm</button>
    <button class="btn" data-model="astronaut.glb" data-name="ASTRONAUT">astronaut</button>
    <button class="btn" data-model="crashed_ship.glb" data-name="CRASHED_SHIP">crashed ship</button>
  </div>
  <div style="margin-top:8px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
    <span style="color:rgba(255,255,255,0.3);font-size:9px;letter-spacing:1px;">ALIENS</span>
    <button class="btn alien-btn" data-faction="wanderer" data-name="WANDERER">wanderer</button>
    <button class="btn alien-btn" data-faction="verdant" data-name="VERDANT">verdant</button>
    <button class="btn alien-btn" data-faction="monolith" data-name="MONOLITH">monolith</button>
    <select class="sel" id="weaponSelect">
      <option value="">unarmed</option>
      <option value="_spear">spearthrower</option>
      <option value="_bow">archer</option>
      <option value="_staff">shaman / staff</option>
    </select>
  </div>
  <div id="emoteBar" style="margin-top:8px;display:none;gap:6px;flex-wrap:wrap;">
    <span style="color:rgba(255,255,255,0.3);font-size:9px;letter-spacing:1px;">EMOTES</span>
    <button class="btn emote-btn" data-anim="Idle">idle</button>
    <button class="btn emote-btn" data-anim="Walk">walk</button>
    <button class="btn emote-btn" data-anim="Attack">attack</button>
    <button class="btn emote-btn" data-anim="Throw">throw</button>
  </div>
</div>
<style>
  .btn { background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.3); color: #00d4ff; padding: 4px 10px; font-family: inherit; font-size: 10px; letter-spacing: 1px; cursor: pointer; border-radius: 3px; }
  .btn:hover { background: rgba(0,212,255,0.2); }
  .btn.active { background: rgba(0,212,255,0.3); color: #fff; }
  .sel { background: rgba(0,212,255,0.08); border: 1px solid rgba(0,212,255,0.25); color: #00d4ff; padding: 4px 8px; font-family: inherit; font-size: 10px; letter-spacing: 1px; cursor: pointer; border-radius: 3px; }
  .sel option { background: #0a0a14; color: #00d4ff; }
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const canvas = document.getElementById('canvas');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x05050a);
scene.fog = new THREE.FogExp2(0x05050a, 0.05);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(4, 2, 5);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;

// Lights
const ambient = new THREE.AmbientLight(0x404050, 0.5);
scene.add(ambient);

const key = new THREE.DirectionalLight(0xffffff, 2.0);
key.position.set(5, 8, 5);
scene.add(key);

const fill = new THREE.DirectionalLight(0x8899ff, 0.8);
fill.position.set(-5, 3, -3);
scene.add(fill);

const rim = new THREE.DirectionalLight(0xff4060, 0.3);
rim.position.set(0, 0, -8);
scene.add(rim);

// Star background
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(600 * 3);
for (let i = 0; i < 600; i++) {
  const r = 30 + Math.random() * 20;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(Math.random() * 2 - 1);
  starPos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
  starPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
  starPos[i*3+2] = r * Math.cos(phi);
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.08, sizeAttenuation: true });
scene.add(new THREE.Points(starGeo, starMat));

// Ground grid (subtle, sci-fi)
const grid = new THREE.GridHelper(20, 20, 0x003355, 0x001122);
grid.position.y = -1;
scene.add(grid);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 1, 0);

// Model loading (switchable)
const loader = new GLTFLoader();
let currentModel = null;

function loadModel(path, name) {
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('loading').textContent = 'LOADING...';
  document.getElementById('hudTitle').textContent = name;

  if (currentModel) {
    scene.remove(currentModel);
    currentModel.traverse(obj => {
      if (obj.geometry) obj.geometry.dispose();
      if (obj.material) obj.material.dispose();
    });
  }

  loader.load('../models/' + path, (gltf) => {
    currentModel = gltf.scene;
    scene.add(currentModel);

    // Animation setup
    if (mixer) { mixer.stopAllAction(); mixer = null; }
    animActions = {};
    const emoteBar = document.getElementById('emoteBar');
    if (gltf.animations && gltf.animations.length > 0) {
      mixer = new THREE.AnimationMixer(currentModel);
      gltf.animations.forEach(clip => {
        animActions[clip.name] = mixer.clipAction(clip);
      });
      emoteBar.style.display = 'flex';
      playAnim('Idle');
    } else {
      emoteBar.style.display = 'none';
    }

    document.getElementById('loading').classList.add('hidden');
  }, undefined, (err) => {
    document.getElementById('loading').textContent = 'ERROR: ' + err.message;
    console.error(err);
  });
}

// Button handlers — regular model buttons
document.querySelectorAll('.btn[data-model]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.btn,.alien-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadModel(btn.dataset.model, btn.dataset.name);
  });
});

// Alien faction buttons — combine faction + weapon variant
let activeFaction = '';
const weaponSelect = document.getElementById('weaponSelect');

document.querySelectorAll('.alien-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.btn,.alien-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFaction = btn.dataset.faction;
    const variant = weaponSelect.value;
    const file = 'alien_' + activeFaction + variant + '.glb';
    loadModel(file, btn.dataset.name + (variant ? variant.toUpperCase() : ''));
  });
});

weaponSelect.addEventListener('change', () => {
  if (!activeFaction) return;
  const variant = weaponSelect.value;
  const file = 'alien_' + activeFaction + variant + '.glb';
  const name = activeFaction.toUpperCase() + (variant ? variant.toUpperCase() : '');
  loadModel(file, name);
});

// Load rocket initially
document.querySelector('.btn[data-model="rocket.glb"]').classList.add('active');
loadModel('rocket.glb', 'ROCKET_001');

// Animation system
let mixer = null;
let animActions = {};
let currentAnim = '';

function playAnim(name) {
  if (!animActions[name]) return;
  if (currentAnim === name) return;
  const prev = animActions[currentAnim];
  const next = animActions[name];
  if (prev) prev.fadeOut(0.3);
  next.reset().fadeIn(0.3).play();
  const looping = (name === 'Idle' || name === 'Walk');
  next.setLoop(looping ? THREE.LoopRepeat : THREE.LoopOnce);
  next.clampWhenFinished = !looping;
  currentAnim = name;

  if (!looping && mixer) {
    const onDone = () => {
      mixer.removeEventListener('finished', onDone);
      playAnim('Idle');
    };
    mixer.addEventListener('finished', onDone);
  }
}

document.querySelectorAll('.emote-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.emote-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    playAnim(btn.dataset.anim);
  });
});

const clock = new THREE.Clock();

function tick() {
  const dt = clock.getDelta();
  if (currentModel) currentModel.rotation.y += 0.005;
  if (mixer) mixer.update(dt);
  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
tick();

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
